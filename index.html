<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DÍAS DE MALA RACHA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12d8f7">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#001b44;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    font-family:'Orbitron', sans-serif;
}

/* CÍRCULO */

.circulo{

    width:340px;

    height:340px;

    border-radius:50%;

    background:#12d8f7;

    border:7px solid white;

    display:flex;

    justify-content:center;

    align-items:center;

    box-shadow:
        0 0 25px rgba(18,216,247,0.8),
        0 0 50px rgba(18,216,247,0.5),
        inset 0 0 25px rgba(255,255,255,0.2);

    animation:pulso 2s infinite;
}

/* CONTENIDO */

.contenido{

    width:65%;

    text-align:center;

    color:white;

    animation:blink 1s infinite;
}

/* TITULOS */

.titulo{

    font-size:16px;

    font-weight:700;

    letter-spacing:2px;

    margin-bottom:6px;
}

/* NÚMEROS */

.numero{

    font-size:46px;

    font-weight:900;

    line-height:1;

    text-shadow:
        0 0 10px rgba(255,255,255,0.9),
        0 0 20px rgba(255,255,255,0.7);

    margin-bottom:8px;
}

/* LÍNEA */

.linea{

    width:100%;

    height:2px;

    background:white;

    margin:12px auto;
}

/* TEXTO */

.texto{

    margin-top:8px;

    font-size:13px;

    font-weight:700;

    line-height:1.4;

    letter-spacing:1px;
}

/* ESTRELLAS */

.estrellas{

    margin-top:10px;

    font-size:10px;

    letter-spacing:4px;
}

/* PARPADEO */

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:0.45;
    }

    100%{
        opacity:1;
    }
}

/* PULSO */

@keyframes pulso{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.02);
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="circulo">

    <div class="contenido">

        <div class="titulo">
            SOPORTADOS
        </div>

        <div class="numero" id="pasados">
            0
        </div>

        <div class="linea"></div>

        <div class="titulo">
            QUEDAN
        </div>

        <div class="numero" id="faltan">
            0
        </div>

        <div class="texto">
            DÍAS DE MALA RACHA
        </div>

        <div class="estrellas">
            ★ ★ ★ ★ ★
        </div>

    </div>

</div>

<script>

/* FECHA INICIO */

const fechaInicio = new Date("2026-01-27");

/* FECHA FINAL */

const fechaFinal = new Date("2030-01-27");

function actualizar(){

    const hoy = new Date();

    /* DÍAS PASADOS */

    const diferenciaPasados = hoy - fechaInicio;

    const diasPasados = Math.floor(
        diferenciaPasados / (1000 * 60 * 60 * 24)
    );

    /* DÍAS FALTANTES */

    const diferenciaFaltan = fechaFinal - hoy;

    const diasFaltan = Math.floor(
        diferenciaFaltan / (1000 * 60 * 60 * 24)
    );

    document.getElementById("pasados").innerHTML =
        diasPasados;

    document.getElementById("faltan").innerHTML =
        diasFaltan;
}

actualizar();

</script>

</body>
</html>
